name: 📦 Publish crate to crates.io

# Dependencies: none — self-contained.
#
# Publishes the `decmpfs` core crate to crates.io via Trusted Publishing:
# `rust-lang/crates-io-auth-action` mints a short-lived registry token from this
# job's OIDC identity (`id-token: write`), so no CARGO_REGISTRY_TOKEN secret is
# stored anywhere. The crates.io Trusted Publisher must be configured to match
# decmpfs/decmpfs/.github/workflows/cargo-publish.yml.
#
# The npm addon publishes separately (npm-publish.yml). Both run
# scripts/repo/check-versions.mts first so the crate and the npm packages never
# ship a mismatched version.

on:
  # Publishing a GitHub Release (github-release.yml, on a vX.Y.Z tag) triggers a
  # real publish. workflow_dispatch stays for manual dry-run testing.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (default: true)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # Don't cancel publishing.

# No-phone-home posture: every tool this workflow touches runs telemetry-off.
env:
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: '1'
  COREPACK_ENABLE_PROJECT_SPEC: '0'
  DISABLE_TELEMETRY: '1'
  DO_NOT_TRACK: '1'
  NO_UPDATE_NOTIFIER: '1'

jobs:
  publish:
    name: Publish decmpfs to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Real publishes run in the `release` environment (reviewer gate + a tighter
    # OIDC trusted-publisher match); only a manual dry-run dispatch skips it.
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry-run == 'true') && '' || 'release' }}
    permissions:
      # Needed for crates.io Trusted Publishing via OIDC.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (2026-06-29)
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-06-29)
        with:
          node-version: 24 # strips the .mts release scripts natively
          package-manager-cache: false
      - uses: ./.github/actions/repo/setup-sfw
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5 (2026-06-16)
      # The script owns the whole flow (version gate → registry read →
      # publish) so CI and a local operator run the same code.
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          # Release-triggered = real publish; manual dispatch honors its input.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || 'false' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" != "true" ]; then
            ARGS="--publish"
          fi
          node scripts/repo/publish-crate.mts $ARGS
